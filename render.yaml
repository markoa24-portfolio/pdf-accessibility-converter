services:
  - type: web
    name: pdf-accessibility-converter
    env: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get update
      apt-get install -y poppler-utils tesseract-ocr
    startCommand: streamlit run app.py --server.port 10000 --server.address 0.0.0.0
    envVars:
      - key: GEMINI_API_KEY
        sync: false
